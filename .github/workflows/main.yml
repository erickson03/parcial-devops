name: Deploy to Surge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Surge
        run: npm install --global surge

      - name: Deploy
        run: surge ./ \
             https://erickson-devops-parcial.surge.sh \
             --token ${{ secrets.SURGE_TOKEN }}
